name: lullify
description: Lullify — 틀어두면 조용히 잠들고 알아서 꺼지는 수면 사운드 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  firebase_auth: ^5.1.0

  # Audio
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.12
  audio_service: ^0.18.14

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Local Storage
  shared_preferences: ^2.3.0
  hive_flutter: ^1.1.0

  # Ads
  google_mobile_ads: ^5.1.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
