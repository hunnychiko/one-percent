<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백분의일 관리자</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-view" class="view">
  <div class="login-card">
    <div class="logo">1/100</div>
    <h2>관리자 로그인</h2>
    <input id="email-input" type="email" placeholder="관리자 이메일" autocomplete="email">
    <div style="position:relative">
      <input id="pw-input" type="password" placeholder="비밀번호" autocomplete="current-password" style="padding-right:48px;width:100%;box-sizing:border-box">
      <button type="button" id="pw-toggle" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:0;color:var(--text-sec)">👁</button>
    </div>
    <button id="login-btn" class="btn-primary">로그인</button>
    <p id="login-error" class="error-msg"></p>
  </div>
</div>

<!-- 관리자 대시보드 -->
<div id="admin-view" class="view hidden">
  <header class="topbar">
    <span class="topbar-title">1/100 관리자</span>
    <div class="topbar-right">
      <span id="admin-email" class="admin-email"></span>
      <button id="logout-btn" class="btn-ghost">로그아웃</button>
    </div>
  </header>

  <nav class="sidebar">
    <button class="nav-btn active" data-section="products">상품 관리</button>
    <button class="nav-btn" data-section="draws">추첨 현황</button>
    <button class="nav-btn" data-section="users">사용자</button>
    <button class="nav-btn" data-section="bonus">보너스 설정</button>
  </nav>

  <main class="content">
    <!-- 상품 관리 -->
    <section id="section-products" class="section">
      <div class="section-header">
        <h2>상품 목록</h2>
        <button id="add-product-btn" class="btn-primary">+ 상품 추가</button>
      </div>
      <div id="products-list" class="card-grid"></div>
    </section>

    <!-- 추첨 현황 -->
    <section id="section-draws" class="section hidden">
      <div class="section-header">
        <h2>추첨 현황</h2>
      </div>
      <div id="draws-list" class="table-wrap">
        <table>
          <thead>
            <tr><th>상품명</th><th>회차</th><th>현재/정원</th><th>상태</th><th>추첨방식</th><th>액션</th></tr>
          </thead>
          <tbody id="draws-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- 사용자 -->
    <section id="section-users" class="section hidden">
      <div class="section-header">
        <h2>사용자 현황</h2>
      </div>
      <div id="users-stats" class="stats-grid"></div>
    </section>

    <!-- 보너스 설정 -->
    <section id="section-bonus" class="section hidden">
      <div class="section-header">
        <h2>데일리 보너스 설정</h2>
        <button id="save-bonus-btn" class="btn-primary">저장</button>
      </div>
      <div style="max-width:480px">
        <div class="form-row" style="flex-direction:row;align-items:center;justify-content:space-between">
          <label style="font-size:14px;color:var(--text)">데일리 보너스 활성화</label>
          <label class="toggle-switch">
            <input type="checkbox" id="bonus-enabled" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="form-row">
          <label>기본 지급 승부권 수</label>
          <input id="bonus-tickets" type="number" min="1" max="20" value="1" placeholder="1">
        </div>
        <div class="form-row">
          <label>D-Day 날짜 (선택 · YYYY-MM-DD)</label>
          <input id="bonus-dday" type="text" placeholder="예: 2026-07-01">
        </div>
        <div class="form-row">
          <label>D-Day 배너 이름 (선택)</label>
          <input id="bonus-dday-label" type="text" placeholder="예: 창립 기념 D-Day 보너스">
        </div>
        <p style="font-size:12px;color:var(--text-sec);margin-top:8px">
          D-Day 날짜가 설정된 날에는 D-Day 배너와 이름이 표시됩니다. 비워두면 기본 데일리 보너스 모드로 동작합니다.
        </p>
      </div>
    </section>
  </main>
</div>

<!-- 상품 추가/수정 모달 -->
<div id="product-modal" class="modal hidden">
  <div class="modal-card">
    <h3 id="modal-title">상품 추가</h3>
    <input type="hidden" id="modal-room-id">
    <div class="form-row">
      <label>상품명</label>
      <input id="f-name" type="text" placeholder="예: 에어팟 프로 2세대">
    </div>
    <div class="form-row">
      <label>설명</label>
      <input id="f-desc" type="text" placeholder="짧은 설명">
    </div>
    <div class="form-row">
      <label>상품 이미지 URL (선택)</label>
      <input id="f-image-url" type="text" placeholder="https://... (이미지 직접 링크)">
    </div>
    <div class="form-row two-col">
      <div>
        <label>등급</label>
        <select id="f-grade">
          <option value="C">데일리찬스 (3연승)</option>
          <option value="B">위클리찬스 (5연승)</option>
          <option value="A">프라임찬스 (7-10연승)</option>
          <option value="S">스페셜찬스 (10-15연승)</option>
          <option value="SS">프리미엄찬스 (15-20연승)</option>
        </select>
      </div>
      <div>
        <label>필요 연승</label>
        <input id="f-streak" type="number" min="1" max="20" value="3">
      </div>
    </div>
    <div class="form-row two-col">
      <div>
        <label>정원</label>
        <input id="f-capacity" type="number" min="10" value="100">
      </div>
      <div>
        <label>상품 유형</label>
        <select id="f-type">
          <option value="coupon">쿠폰/제휴</option>
          <option value="physical">실물 배송</option>
          <option value="premium">고가 실물</option>
        </select>
      </div>
    </div>
    <div class="form-row two-col">
      <div>
        <label>직접구매 가격 (선택)</label>
        <input id="f-direct" type="text" placeholder="₩9,900">
      </div>
      <div>
        <label>추첨 방식</label>
        <select id="f-draw-method">
          <option value="timestamp">타임스탬프 (기본)</option>
          <option value="lotto">동행복권 API (SS급)</option>
        </select>
      </div>
    </div>
    <div class="form-row two-col">
      <div>
        <label>추첨 유형</label>
        <select id="f-draw-type">
          <option value="capacity">인원 달성 추첨 (기본)</option>
          <option value="time">시간 제한 추첨 (24h)</option>
        </select>
      </div>
      <div id="draw-deadline-wrap">
        <label>마감 일시 (time 유형)</label>
        <input id="f-draw-deadline" type="datetime-local">
      </div>
    </div>
    <div class="form-row">
      <label>상태</label>
      <select id="f-status">
        <option value="open">open (진행 중)</option>
        <option value="closed">closed (마감)</option>
        <option value="drawn">drawn (추첨 완료)</option>
      </select>
    </div>
    <div class="modal-footer">
      <button id="modal-cancel-btn" class="btn-ghost">취소</button>
      <button id="modal-save-btn" class="btn-primary">저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="confirm-modal" class="modal hidden">
  <div class="modal-card small">
    <h3>상품 삭제</h3>
    <p id="confirm-msg"></p>
    <div class="modal-footer">
      <button id="confirm-cancel-btn" class="btn-ghost">취소</button>
      <button id="confirm-ok-btn" class="btn-danger">삭제</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>
